name: Build Windows Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e . pytest

      - name: Run tests (non-blocking)
        continue-on-error: true
        run: |
          $env:PYTHONPATH = "src"
          python -m pytest tests/ -q
        shell: pwsh

  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          pip install -e .
          pip install pyinstaller

      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build

      - name: Verify frontend build
        run: |
          if (!(Test-Path "frontend\dist\index.html")) {
            Write-Error "Frontend build failed -- frontend/dist/index.html not found"
            exit 1
          }
        shell: pwsh

      - name: Bundle with PyInstaller
        run: pyinstaller --noconfirm libriscribe.spec

      - name: Verify PyInstaller output
        run: |
          if (!(Test-Path "dist\LibriScribeGUI\LibriScribeGUI.exe")) {
            Write-Error "PyInstaller output not found"
            exit 1
          }
        shell: pwsh

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        run: |
          $env:PATH = "C:\Program Files (x86)\Inno Setup 6;$env:PATH"
          iscc installer\libriscribe.iss
        shell: pwsh

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: LibriScribeGUI-Installer
          path: dist/installer/LibriScribeGUI-*-Setup.exe
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/installer/LibriScribeGUI-*-Setup.exe
          generate_release_notes: true
