name: Deploy Docs (Docusaurus)

# Builds the Docusaurus site in docs/ and publishes it to GitHub Pages.
# Requires GitHub Pages to be enabled for the repo with "Source: GitHub Actions"
# (Settings -> Pages). Until then the build still runs but has nothing to publish to.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let a newer run cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docs/package-lock.json

      # ONE-TIME MANUAL STEP: enable GitHub Pages with Source "GitHub Actions" at
      #   https://github.com/mthous72/libriscribe/settings/pages
      # The default GITHUB_TOKEN cannot enable Pages via the API ("Resource not accessible
      # by integration"), so this can't be automated. Once enabled, this workflow deploys
      # on every push under docs/.
      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build site
        working-directory: docs
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
